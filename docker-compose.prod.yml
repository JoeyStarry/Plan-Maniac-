version: '3.8'

services:
  db:
    image: postgres:15
    container_name: plan-maniac-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: plan-maniac
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7
    container_name: plan-maniac-redis
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    restart: always

  api:
    build:
      context: ./plan-maniac-api
      dockerfile: Dockerfile
    container_name: plan-maniac-api
    environment:
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-password}@db:5432/plan-maniac?schema=public
      JWT_SECRET: ${JWT_SECRET:-super-secret-jwt-key-plan-maniac-v1}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      PORT: 3000
    ports:
      - '3000:3000'
    depends_on:
      - db
      - redis
    restart: always
    command: sh -c "npx prisma db push && node dist/main.js"

  web:
    build:
      context: ./plan-maniac-web
      dockerfile: Dockerfile
    container_name: plan-maniac-web
    ports:
      - '80:80'
    depends_on:
      - api
    restart: always

volumes:
  postgres-data:
  redis-data:
