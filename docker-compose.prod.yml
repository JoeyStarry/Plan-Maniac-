version: '3.8'

services:
  db:
    image: postgres:15
    container_name: plan-maniac-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_DB: plan-maniac
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: always
    networks:
      - app-network

  redis:
    image: redis:7
    container_name: plan-maniac-redis
    volumes:
      - redis-data:/data
    restart: always
    networks:
      - app-network

  api:
    image: ${IMAGE_API:-ghcr.io/joeystarry/plan-maniac-api:latest}
    container_name: plan-maniac-api
    environment:
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-changeme}@db:5432/plan-maniac?schema=public
      JWT_SECRET: ${JWT_SECRET:-change-this-secret}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      PORT: 3000
    ports:
      - '3000:3000'
    depends_on:
      - db
      - redis
    restart: always
    networks:
      - app-network
    command: sh -c "npx prisma db push && node dist/main.js"

  web:
    image: ${IMAGE_WEB:-ghcr.io/joeystarry/plan-maniac-web:latest}
    container_name: plan-maniac-web
    ports:
      - '80:80'
    depends_on:
      - api
    restart: always
    networks:
      - app-network

volumes:
  postgres-data:
  redis-data:

networks:
  app-network:
    driver: bridge
