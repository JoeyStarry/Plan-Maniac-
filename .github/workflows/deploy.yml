name: Deploy to Production

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io

jobs:
  # ──────────────────────────────────────────
  # Job 1: Build & Push Docker Images
  # ──────────────────────────────────────────
  build:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set lowercase image names
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_API=ghcr.io/${OWNER}/plan-maniac-api" >> $GITHUB_ENV
          echo "IMAGE_WEB=ghcr.io/${OWNER}/plan-maniac-web" >> $GITHUB_ENV

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: ./plan-maniac-api
          file: ./plan-maniac-api/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_API }}:latest
            ${{ env.IMAGE_API }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Web image
        uses: docker/build-push-action@v5
        with:
          context: ./plan-maniac-web
          file: ./plan-maniac-web/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_WEB }}:latest
            ${{ env.IMAGE_WEB }}:${{ github.sha }}
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────
  # Job 2: Deploy to EC2 via SSH
  # ──────────────────────────────────────────
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Set lowercase image names
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_API=ghcr.io/${OWNER}/plan-maniac-api" >> $GITHUB_ENV
          echo "IMAGE_WEB=ghcr.io/${OWNER}/plan-maniac-web" >> $GITHUB_ENV

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PlanManiac_HOST }}
          username: ${{ secrets.PlanManiac_USER }}
          key: ${{ secrets.PlanManiac_SSH_KEY }}
          envs: IMAGE_API,IMAGE_WEB
          command_timeout: 10m
          script: |
            set -e

            # ── Install Docker if not present ──
            if ! command -v docker &> /dev/null; then
              echo "Installing Docker..."
              curl -fsSL https://get.docker.com | sh
              sudo usermod -aG docker $USER
              newgrp docker
            fi

            # ── Clone or pull latest code ──
            if [ ! -d ~/plan-maniac ]; then
              echo "Cloning repository..."
              git clone https://github.com/JoeyStarry/Plan-Maniac-.git ~/plan-maniac
            fi
            cd ~/plan-maniac
            git pull origin main

            # ── Log in to GitHub Container Registry ──
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # ── Pull latest images ──
            docker pull ${IMAGE_API}:latest
            docker pull ${IMAGE_WEB}:latest

            # ── Write .env.prod ──
            cat > .env.prod << EOF
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            VITE_API_URL=${{ secrets.VITE_API_URL }}
            IMAGE_API=${IMAGE_API}:latest
            IMAGE_WEB=${IMAGE_WEB}:latest
            EOF

            # ── Start / restart services ──
            docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --no-build

            # ── Clean up old images ──
            docker image prune -f

            echo "✅ Deployment complete!"
