name: Deploy to Production

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_API: ghcr.io/${{ github.repository_owner }}/plan-maniac-api
  IMAGE_WEB: ghcr.io/${{ github.repository_owner }}/plan-maniac-web

jobs:
  # ──────────────────────────────────────────
  # Job 1: Build & Push Docker Images
  # ──────────────────────────────────────────
  build:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ---- Build API image ----
      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: ./plan-maniac-api
          file: ./plan-maniac-api/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_API }}:latest
            ${{ env.IMAGE_API }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ---- Build Web image (inject API URL at build time) ----
      - name: Build and push Web image
        uses: docker/build-push-action@v5
        with:
          context: ./plan-maniac-web
          file: ./plan-maniac-web/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_WEB }}:latest
            ${{ env.IMAGE_WEB }}:${{ github.sha }}
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────
  # Job 2: Deploy to EC2 via SSH
  # ──────────────────────────────────────────
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e

            # Navigate to project directory
            cd ~/plan-maniac

            # Pull latest docker-compose file
            git pull origin main

            # Log in to GitHub Container Registry
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull latest images
            docker pull ${{ env.IMAGE_API }}:latest
            docker pull ${{ env.IMAGE_WEB }}:latest

            # Write environment variables
            cat > .env.prod << EOF
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            VITE_API_URL=${{ secrets.VITE_API_URL }}
            IMAGE_API=${{ env.IMAGE_API }}:latest
            IMAGE_WEB=${{ env.IMAGE_WEB }}:latest
            EOF

            # Restart services with zero-downtime
            docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --no-build

            # Clean up old images
            docker image prune -f

            echo "✅ Deployment complete!"
