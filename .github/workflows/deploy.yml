name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  # ──────────────────────────────────────────
  # Job 1: Build & Push Docker Images
  # ──────────────────────────────────────────
  build:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_api: ${{ steps.set_names.outputs.image_api }}
      image_web: ${{ steps.set_names.outputs.image_web }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set lowercase image names
        id: set_names
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "image_api=ghcr.io/${OWNER}/plan-maniac-api" >> $GITHUB_OUTPUT
          echo "image_web=ghcr.io/${OWNER}/plan-maniac-web" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: ./plan-maniac-api
          file: ./plan-maniac-api/Dockerfile
          push: true
          tags: |
            ${{ steps.set_names.outputs.image_api }}:latest
            ${{ steps.set_names.outputs.image_api }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Web image
        uses: docker/build-push-action@v5
        with:
          context: ./plan-maniac-web
          file: ./plan-maniac-web/Dockerfile
          push: true
          tags: |
            ${{ steps.set_names.outputs.image_web }}:latest
            ${{ steps.set_names.outputs.image_web }}:${{ github.sha }}
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────
  # Job 2: Deploy to EC2 via SSH
  # ──────────────────────────────────────────
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PlanManiac_HOST }}
          username: ${{ secrets.PlanManiac_USER }}
          key: ${{ secrets.PlanManiac_SSH_KEY }}
          command_timeout: 15m
          script: |
            set -e

            IMAGE_API="${{ needs.build.outputs.image_api }}"
            IMAGE_WEB="${{ needs.build.outputs.image_web }}"

            # ── Ensure ubuntu user is in docker group ──
            sudo usermod -aG docker $USER || true

            # ── Clone or pull latest code ──
            if [ ! -d "$HOME/plan-maniac" ]; then
              git clone https://github.com/JoeyStarry/Plan-Maniac-.git "$HOME/plan-maniac"
            fi
            cd "$HOME/plan-maniac"
            git fetch origin main
            git reset --hard origin/main

            # ── Login & pull images as root (sudo -H preserves root HOME for credentials) ──
            echo "${{ secrets.GITHUB_TOKEN }}" | sudo -H docker login ghcr.io -u ${{ github.actor }} --password-stdin
            sudo -H docker pull ${IMAGE_API}:latest
            sudo -H docker pull ${IMAGE_WEB}:latest

            # ── Write .env.prod ──
            cat > "$HOME/plan-maniac/.env.prod" << ENVEOF
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            VITE_API_URL=${{ secrets.VITE_API_URL }}
            MOONSHOT_API_KEY=${{ secrets.MOONSHOT_API_KEY }}
            IMAGE_API=${IMAGE_API}:latest
            IMAGE_WEB=${IMAGE_WEB}:latest
            ENVEOF

            # ── Restart services ──
            sudo -H docker compose -f "$HOME/plan-maniac/docker-compose.prod.yml" --env-file "$HOME/plan-maniac/.env.prod" up -d --no-build

            # ── Clean up ──
            sudo -H docker image prune -f

            echo "✅ Deployment complete!"
