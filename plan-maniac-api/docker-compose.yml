version: '3.8'

services:
  db:
    image: postgres:15
    container_name: plan-maniac-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: plan-maniac
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7
    container_name: plan-maniac-redis
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    restart: always

volumes:
  postgres-data:
  redis-data:
