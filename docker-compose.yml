version: '3.8'
services:
  postgres:
    image: postgres:15
    container_name: pm_postgres
    restart: always
    environment:
      POSTGRES_USER: planmaniac
      POSTGRES_PASSWORD: planmaniac_pwd
      POSTGRES_DB: planmaniac_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: pm_redis
    restart: always
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
